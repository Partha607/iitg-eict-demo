name: Deploy site to GitHub Pages

# Build the Next.js static export and publish it to GitHub Pages
# whenever the main branch updates. Also runnable on demand.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; a queued build supersedes an in-flight one
# only after it finishes (so we never publish a half-baked artifact).
concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5
        # Exposes:
        #   steps.pages.outputs.base_path  -> "/<repo>" for project pages, "" for user/org sites
        #   steps.pages.outputs.origin     -> deployed URL origin

      - name: Install dependencies
        run: npm ci

      - name: Build (Next.js static export)
        env:
          # Used by next.config.ts + layout metadata icons
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}
          # Origin (e.g. "https://owner.github.io" - no base path) used to
          # build absolute URLs in OpenGraph / Twitter metadata so link
          # unfurls in Slack/WhatsApp/etc. can fetch the thumbnail.
          NEXT_PUBLIC_SITE_ORIGIN: ${{ steps.pages.outputs.origin }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
